<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <title>Polaris - Sin conexion</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b1120;
        color: #f8fafc;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
      }

      main {
        width: min(32rem, calc(100vw - 3rem));
      }

      img {
        width: 4rem;
        height: 4rem;
      }

      h1 {
        margin: 1.5rem 0 0.75rem;
        font-size: clamp(2rem, 8vw, 3.5rem);
        line-height: 1;
      }

      p {
        margin: 0;
        color: #cbd5e1;
        font-size: 1rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/pwa-icon.svg" alt="" />
      <h1>Sin conexion</h1>
      <p>Polaris esta instalado, pero esta vista necesita recuperar datos. Vuelve a abrirla cuando tengas conexion.</p>
    </main>
  </body>
</html>
